name: Check

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          persist-credentials: false

      - uses: purescript-contrib/setup-purescript@2330ad9736aba56d65964a3335fe9368c9674db8 # v3.1.0
        with:
          purescript: "0.15.15"
          purs-tidy: "latest"

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - run: purs-tidy check src/ test/

      - run: bunx spago build

      - run: bunx spago test

      - run: >-
          mkdir -p dist && printf 'export function renderPage(...args: any[]): any;\n' > dist/server.d.ts

      - run: bunx tsc --noEmit
